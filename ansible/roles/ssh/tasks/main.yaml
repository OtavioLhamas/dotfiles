# SSH role — configures SSH client and server

- name: Ensure ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh"
    state: directory
    mode: '0700'
    owner: "{{ ansible_env.USER }}"
    group: "{{ ansible_env.USER }}"

- name: Generate SSH key pair if missing
  ansible.builtin.command:
    cmd: "ssh-keygen -t ed25519 -C '{{ ansible_hostname }}' -f {{ ansible_env.HOME }}/.ssh/id_ed25519 -N ''"
    creates: "{{ ansible_env.HOME }}/.ssh/id_ed25519"

- name: Ensure ssh-agent is configured in shell
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    line: 'eval "$(ssh-agent -s)" >/dev/null 2>&1'
    insertafter: EOF
    create: yes
  when: ansible_env.SHELL | default('') | regex_search('bash')

- name: Ensure ssh config file exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh/config"
    state: touch
    mode: '0600'
    owner: "{{ ansible_env.USER }}"
    group: "{{ ansible_env.USER }}"

- name: Add common SSH config
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.ssh/config"
    block: |
      # Global SSH settings
      Host *
          AddKeysToAgent yes
          IdentityFile ~/.ssh/id_ed25519
          ServerAliveInterval 60
          ServerAliveCountMax 3
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    create: yes
    mode: '0600'
