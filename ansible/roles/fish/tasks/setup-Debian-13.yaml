- name: Download fish OBS GPG key
  ansible.builtin.get_url:
    url: "{{ fish_obs_gpg_key_url }}"
    dest: "{{ fish_obs_gpg_key_path }}"
    mode: "0644"
  become: true

- name: Add fish OBS repository
  ansible.builtin.deb822_repository:
    name: fish-obs
    types: deb
    uris: "{{ fish_obs_repo_url }}"
    suites: "{{ fish_obs_suite }}"
    components: ""
    signed_by: "{{ fish_obs_gpg_key_path }}"
    state: present
  become: true

- name: Install fish
  ansible.builtin.apt:
    update_cache: true
    name: "{{ fish_package }}{% if fish_version != 'latest' %}={{ fish_version }}{% endif %}"
    state: present
    allow_downgrade: "{{ fish_version != 'latest' }}"
  become: true
