---
- name: Load variables.
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_version'] }}.yaml"
        - "{{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_major_version'] }}.yaml"
        - "{{ ansible_facts['distribution'] }}.yaml"
        - "{{ ansible_facts['os_family'] }}.yaml"
        - main.yaml
      paths:
        - '{{ role_path }}/vars'
      skip: false

- name: Include system appropriate tasks.
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "setup-{{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_version'] }}.yaml"
        - "setup-{{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_major_version'] }}.yaml"
        - "setup-{{ ansible_facts['distribution'] }}.yaml"
        - "setup-{{ ansible_facts['os_family'] }}.yaml"
      paths: "{{ role_path }}/tasks"
      skip: true

- name: Set fish as default shell
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    shell: /usr/bin/fish
  become: true
  when: fish_set_default_shell | bool | default(false)

- name: Log out warn
  ansible.builtin.debug:
    msg: "Fish set as the default shell. You might need to log out to apply changes."
  when: fish_set_default_shell | bool | default(false)
