---
# HideRecentJumplists
- name: Set HideRecentJumplists
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\Explorer
    name: HideRecentJumplists
    data: "{{ windows_startmenu_hide_recent | ternary('1', omit) }}"
    type: dword
    state: "{{ windows_startmenu_hide_recent | ternary('present', 'absent') }}"
  notify:
    # - Clear start menu cache
    - Restart Windows Explorer

# HideRecommendedSection (newer builds)
- name: Set HideRecommendedSection
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\Explorer
    name: HideRecommendedSection
    data: "{{ windows_startmenu_hide_recommended | ternary('1', '0') }}"
    type: dword
    state: present
  notify:
    # - Clear start menu cache
    - Restart Windows Explorer

# ShowRecommendedSection (legacy compatibility — inverted logic)
- name: Set ShowRecommendedSection
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\Explorer
    name: ShowRecommendedSection
    data: "{{ windows_startmenu_hide_recommended | ternary(omit, '1') }}"
    type: dword
    state: "{{ windows_startmenu_hide_recommended | ternary('present', 'absent') }}"
  notify:
    # - Clear start menu cache
    - Restart Windows Explorer

# HideRecentlyAddedApps
- name: Set HideRecentlyAddedApps
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\Explorer
    name: HideRecentlyAddedApps
    data: "{{ windows_startmenu_hide_recently_added | ternary('1', omit) }}"
    type: dword
    state: "{{ windows_startmenu_hide_recently_added | ternary('present', 'absent') }}"
  notify:
    # - Clear start menu cache
    - Restart Windows Explorer

# ShowOrHideMostUsedApps (2 = hide, 1 = show)
- name: Set ShowOrHideMostUsedApps
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\Explorer
    name: ShowOrHideMostUsedApps
    data: "{{ windows_startmenu_hide_most_used | ternary('2', omit) }}"
    type: dword
    state: "{{ windows_startmenu_hide_most_used | ternary('present', 'absent') }}"
  notify:
    # - Clear start menu cache
    - Restart Windows Explorer

# NoRecentDocsHistory
- name: Set NoRecentDocsHistory
  ansible.windows.win_regedit:
    path: HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer
    name: NoRecentDocsHistory
    data: "{{ windows_startmenu_disable_recent_docs | ternary('1', omit) }}"
    type: dword
    state: "{{ windows_startmenu_disable_recent_docs | ternary('present', 'absent') }}"
  notify:
    # - Clear start menu cache
    - Restart Windows Explorer

# BingSearchEnabled
- name: Set BingSearchEnabled
  ansible.windows.win_regedit:
    path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Search
    name: BingSearchEnabled
    data: "{{ windows_startmenu_disable_bing_search | ternary('0', omit) }}"
    type: dword
    state: "{{ windows_startmenu_disable_bing_search | ternary('present', 'absent') }}"
  notify:
    # - Clear start menu cache
    - Restart Windows Explorer

# Microsoft Store recommendations — deny Everyone on store.db via ACL
- name: Set deny ACL on store.db
  ansible.windows.win_acl:
    path: "{{ ansible_facts['env']['LOCALAPPDATA'] }}\\Packages\\Microsoft.WindowsStore_8wekyb3d8bbwe\\LocalState\\store.db"
    user: "{{ ansible_facts['user_sid'] }}"
    type: deny
    rights: FullControl
    state: present
  when: windows_startmenu_disable_store_recommendations
  notify:
    # - Clear start menu cache
    - Restart Windows Explorer

- name: Remove deny ACL on store.db
  ansible.windows.win_acl:
    path: "{{ ansible_facts['env']['LOCALAPPDATA'] }}\\Packages\\Microsoft.WindowsStore_8wekyb3d8bbwe\\LocalState\\store.db"
    user: "{{ ansible_facts['user_sid'] }}"
    type: deny
    rights: FullControl
    state: absent
  when: not windows_startmenu_disable_store_recommendations
  notify:
    # - Clear start menu cache
    - Restart Windows Explorer
