---
- name: Get latest release info
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ sigma_file_manager_github_repo }}/releases/latest"
    return_content: true
  register: sigma_file_manager_release_data

- name: Extract AppImage download URL
  ansible.builtin.set_fact:
    sigma_file_manager_appimage_url: >-
      {{ sigma_file_manager_release_data.json.assets
       | selectattr('name', 'search', 'AppImage$')
       | map(attribute='browser_download_url')
       | first }}

- name: Ensure install directory exists
  ansible.builtin.file:
    path: "{{ sigma_file_manager_install_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Download AppImage
  ansible.builtin.get_url:
    url: "{{ sigma_file_manager_appimage_url }}"
    dest: "{{ sigma_file_manager_install_dir }}/{{ sigma_file_manager_appimage_name }}"
    mode: "0755"
    force: "{{ sigma_file_manager_force_reinstall }}"
  become: true

- name: Ensure desktop directory exists
  ansible.builtin.file:
    path: "{{ sigma_file_manager_desktop_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Deploy desktop entry
  ansible.builtin.template:
    src: sigma-file-manager.desktop.j2
    dest: "{{ sigma_file_manager_desktop_dir }}/sigma-file-manager.desktop"
    mode: "0644"
  become: true

- name: Ensure icon directory exists
  ansible.builtin.file:
    path: "{{ sigma_file_manager_icon_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Install icon
  ansible.builtin.copy:
    src: "{{ sigma_file_manager_icon_name }}"
    dest: "{{ sigma_file_manager_icon_dir }}/{{ sigma_file_manager_icon_name }}"
    mode: "0644"
  become: true
