# Common role — system basics
# Installs common packages based on OS/distro

- name: Update package cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

- name: Update package cache (Fedora)
  ansible.builtin.dnf:
    update_cache: yes
  when: ansible_os_family == 'RedHat'

- name: Install common Linux packages
  ansible.builtin.package:
    name: "{{ linux_common_packages }}"
    state: present
  when: linux_common_packages is defined

- name: Install Debian-specific packages
  ansible.builtin.apt:
    name: "{{ debian_common_packages }}"
    state: present
  when:
    - ansible_os_family == 'Debian'
    - debian_common_packages is defined

- name: Install Fedora-specific packages
  ansible.builtin.dnf:
    name: "{{ fedora_common_packages }}"
    state: present
  when:
    - ansible_os_family == 'RedHat'
    - fedora_common_packages is defined

- name: Install work packages
  ansible.builtin.package:
    name: "{{ work_packages }}"
    state: present
  when:
    - work_packages is defined
    - "'work' in group_names"

- name: Install gaming packages
  ansible.builtin.package:
    name: "{{ gaming_packages }}"
    state: present
  when:
    - gaming_packages is defined
    - "'gaming' in group_names"

- name: Install development packages
  ansible.builtin.package:
    name: "{{ dev_packages }}"
    state: present
  when:
    - dev_packages is defined
    - "'development' in group_names"

- name: Install WSL-specific packages
  ansible.builtin.package:
    name: "{{ wsl_specific_packages }}"
    state: present
  when:
    - wsl_specific_packages is defined
    - "'wsl' in group_names"
