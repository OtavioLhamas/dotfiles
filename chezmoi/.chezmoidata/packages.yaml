# Simple apt/dnf install packages from default distro repos.
# For anything requiring repo setup, GPG keys, or multi-step install — use Ansible.
#
# Structure:
#   .packages.common          — all machines
#   .packages.linux.common    — all linux distros
#   .packages.linux.<distro>  — specific distro (pop, ubuntu, debian, fedora)
#   .packages.windows         — all windows
#   .packages.categories.<cat>.common / .linux.common / .linux.<distro>
#   .packages.form_factors.<factor>.common / .linux.common / .linux.<distro>
#   .packages.desktop_environments.<de>.common / .linux.common / .linux.<distro>
#
# Keys can be omitted entirely — the template handles missing/empty safely.

packages:
  common:
  linux:
    common:
      - htop
      - qbittorrent
    pop:
    ubuntu:
    debian:
    fedora:
  windows:

  categories:
    gaming:
      common:
      linux:
        common:
        pop:
        fedora:

    development:
      common:
      linux:
        common:
        pop:
        fedora:

    work:
      common:
      linux:
        common:
        pop:
        fedora:

    multimedia:
      common:
      linux:
        common:
        pop:
        fedora:

    personal:
      common:
      linux:
        common:
        pop:
        fedora:

  form_factors:
    laptop:
      common:
      linux:
        common:
        pop:
        fedora:

    desktop:
      common:
      linux:
        common:
        pop:
        fedora:

    server:
      common:
      linux:
        common:
        pop:
        fedora:

  desktop_environments:
    gnome:
      common:
      linux:
        common:
        pop:
        fedora:

    kde:
      common:
      linux:
        common:
        pop:
        fedora:

    cosmic:
      common:
      linux:
        common:
        pop:
        fedora:

    none:
      common:
      linux:
        common:
        pop:
        fedora:
