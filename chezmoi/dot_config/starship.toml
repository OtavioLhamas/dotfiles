"$schema" = 'https://starship.rs/config-schema.json'

### Base options ###
format = """
$shell\
$directory\
${custom.giturl}\
$git_branch\
$git_status\
$character"""

right_format = """
$status\
$cmd_duration\
$bun\
$c\
$cmake\
$cpp\
$deno\
$docker_context\
$dotnet\
$golang\
$java\
$lua\
$nodejs\
$python\
$rust\
$battery\
$time"""

palette = "rose-pine"
add_newline = false

###

### Prompt ###
[character]
format = "$symbol "
success_symbol = "[ŌØ»](green)"
error_symbol = "[ŌØ»](red)"
vimcmd_symbol = "[ŌØ«](cyan)"

[cmd_duration]
min_time = 100 # in milliseconds
show_milliseconds = true

[directory]
style = 'foam'
truncation_length = 4
truncate_to_repo = false

[git_branch]
symbol = "[ŅéČ](overlay)’Éś "
style = "fg:iris bg:overlay"
format =  " [$symbol$branch]($style)[Ņé┤](overlay)"

[git_status]
format = "[$ahead_behind$stashed$untracked$staged$modified$renamed$deleted$conflicted ]($style)"
ahead      = "[ŌćĪ${count}](pine)"
behind     = "[ŌćŻ${count}](gold)"
staged     = "[+${count}](green)"
modified   = "[!${count}](yellow)"
renamed    = "[┬╗${count}](blue)"
deleted    = "[-${count}](red)"
untracked  = "[?${count}](red)"
stashed    = "[ŌēĪ${count}](iris)"
conflicted = "[Ō£¢${count}](red bold)"
diverged   = "[ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}](iris)"

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="’Éł "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="’Ŗ¢ "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="’ģ▒ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="’×Ī "
else
    GIT_REMOTE_SYMBOL="’ćÆ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
shell = 'bash'
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = '$output'
require_repo = true
ignore_timeout = true

[os]
disabled = true
format = "[$symbol](#blue) "

