"$schema" = 'https://starship.rs/config-schema.json'

### Base options ###
format = """
$shell\
$directory\
${custom.giturl}\
$git_branch\
$git_status\
$character"""

right_format = """
$status\
$cmd_duration\
$bun\
$c\
$cmake\
$cpp\
$deno\
$docker_context\
$dotnet\
$golang\
$java\
$lua\
$nodejs\
$python\
$rust\
$battery\
$time"""

palette = "catppuccin_mocha"
add_newline = false

###

### Prompt ###
[character]
format = "$symbol "
success_symbol = "[‚ĚĮ](green)"
error_symbol = "[‚ĚĮ](red)"
vimcmd_symbol = "[‚Ěģ](cyan)"

[cmd_duration]
min_time = 100 # in milliseconds
show_milliseconds = true

[directory]
style = 'teal'
truncation_length = 4
truncate_to_repo = false

[git_branch]
symbol = "[Óā∂](base)Ôźė "
style = "fg:lavender bg:base"
format =  " [$symbol$branch]($style)[Óāī](base)"

[git_status]
format = "[$ahead_behind$stashed$untracked$staged$modified$renamed$deleted$conflicted ]($style)"
ahead      = "[‚á°${count}](teal)"
behind     = "[‚á£${count}](peach)"
staged     = "[+${count}](green)"
modified   = "[!${count}](yellow)"
renamed    = "[¬Ľ${count}](blue)"
deleted    = "[-${count}](red)"
untracked  = "[?${count}](red)"
stashed    = "[‚Č°${count}](lavender)"
conflicted = "[‚úĖ${count}](red bold)"
diverged   = "[‚áē‚á°${ahead_count}‚á£${behind_count}](mauve)"

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="Ôźą "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="ÔäĖ "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="ÔÖĪ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="Ôě° "
else
    GIT_REMOTE_SYMBOL="Ôáí "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
shell = 'bash'
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = '$output'
require_repo = true
ignore_timeout = true

[os]
disabled = true
format = "[$symbol](#blue) "

